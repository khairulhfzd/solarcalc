version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: solarcalc-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=solarpass
      - MYSQL_DATABASE=solarcalc
    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psolarpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: solarcalc-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=solarpass
      - DB_NAME=solarcalc
      - DB_PORT=3306
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build: ./frontend
    container_name: solarcalc-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
